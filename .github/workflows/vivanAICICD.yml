# This is a basic workflow to help you get started with Actions

name: vivanAICICD

on:
  push:
    branches: ["main"]
  pull_request:

jobs:

# ----------------------------------
# 1. BUILD & TEST
# ----------------------------------
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Unit Tests
      run: |
        pytest

# ----------------------------------
# 2. SAST - Secure Coding
# ----------------------------------
  sast-codeql:
    name: SAST - CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: python

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Run CodeQL Analysis
      uses: github/codeql-action/analyze@v3

# ----------------------------------
# 3. SCA - Dependency Scan
# ----------------------------------
  dependency-scan:
    name: SCA - OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Dependency Check (Fail on High/Critical)
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "secure-project"
        path: "."
        format: "HTML"
        args: >
          --failOnCVSS 7

# ----------------------------------
# 4. SECRET SCAN
# ----------------------------------
  secret-scan:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Gitleaks (Fail on Secrets)
      uses: gitleaks/gitleaks-action@v2

# ----------------------------------
# 5. MALWARE SCAN
# ----------------------------------
  malware-scan:
    name: Malware Scan - ClamAV
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install ClamAV
      run: |
        sudo apt-get update
        sudo apt-get install -y clamav

    - name: Update Virus Database
      run: sudo freshclam

    - name: Run Malware Scan (Fail if detected)
      run: |
        clamscan -r . --infected --exclude-dir=.git --exit-code=1

# ----------------------------------
# 6. OPTIONAL - OWASP ZAP (DAST)
# ----------------------------------
  dast-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: build-test   # run only after app is ready

    steps:
    - name: OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.10.0
      with:
        target: "http://example.com"
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
